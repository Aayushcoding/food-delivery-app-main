<div class="signup-wrapper">

  <!-- Back -->
  <button class="back-btn" (click)="goBack()">← Back</button>

  <!-- Card -->
  <div class="signup-card">

    <!-- Header -->
    <div class="signup-header">
      <span class="role-emoji">🛵</span>
      <h1>Join as Delivery Agent</h1>
      <p class="role-label">Start earning by delivering food across your city</p>
    </div>

    <!-- Success message -->
    <div class="success-banner" *ngIf="successMsg">
      {{ successMsg }}
    </div>

    <!-- Error message -->
    <div class="error-banner" *ngIf="errorMessage">
      ⚠ {{ errorMessage }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>

      <!-- Username -->
      <div class="field-group">
        <label for="da-username">Username</label>
        <input id="da-username"
               type="text"
               [(ngModel)]="username"
               name="username"
               placeholder="e.g. raju_delivery"
               autocomplete="username"
               required>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label for="da-email">Email</label>
        <input id="da-email"
               type="email"
               [(ngModel)]="email"
               name="email"
               placeholder="you@example.com"
               autocomplete="email"
               required>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="da-password">Password</label>
        <div class="pass-wrap">
          <input [type]="showPassword ? 'text' : 'password'"
                 id="da-password"
                 [(ngModel)]="password"
                 name="password"
                 placeholder="Min 6 characters"
                 autocomplete="new-password"
                 required>
          <button type="button" class="eye-btn" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="hint" *ngIf="password.length > 0 && password.length < 6">
          Too short — need at least 6 characters
        </span>
      </div>

      <!-- Phone -->
      <div class="field-group">
        <label for="da-phone">Phone Number <span class="optional">(optional)</span></label>
        <input id="da-phone"
               type="tel"
               [(ngModel)]="phoneNo"
               name="phoneNo"
               placeholder="10-digit number"
               autocomplete="tel"
               maxlength="10">
      </div>

      <!-- Submit -->
      <button type="submit"
              class="submit-btn"
              id="btn-delivery-signup"
              [disabled]="isLoading || !isValid">
        <span *ngIf="!isLoading">🚀 Create Agent Account</span>
        <span *ngIf="isLoading" class="loading-dots">
          Registering<span>.</span><span>.</span><span>.</span>
        </span>
      </button>

    </form>

    <!-- Alt links -->
    <div class="alt-links">
      Already registered?
      <a routerLink="/login/delivery" id="link-delivery-login">Login here</a>
    </div>

  </div>
</div>
