<div class="signup-wrapper">

  <div class="signup-card">

    <!-- Header -->
    <div class="signup-header">
      <span class="brand-logo">🍽</span>
      <h1>ByteBites</h1>
      <p class="tagline">Create your account</p>
    </div>

    <!-- Role selector -->
    <div class="role-strip">
      <button type="button"
              class="role-btn"
              [class.active]="role === 'customer'"
              (click)="selectRole('customer')"
              id="role-customer">
        👤 Customer
      </button>
      <button type="button"
              class="role-btn"
              [class.active]="role === 'owner'"
              (click)="selectRole('owner')"
              id="role-owner">
        🍴 Owner
      </button>
      <button type="button"
              class="role-btn delivery-role"
              (click)="selectRole('delivery')"
              id="role-delivery">
        🛵 Delivery Agent
      </button>
    </div>

    <!-- Error / Success banners -->
    <div *ngIf="errorMessage"   class="error-banner">⚠ {{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-banner">{{ successMessage }}</div>

    <!-- Form -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Username -->
      <div class="field-group">
        <label for="su-username">Username</label>
        <input id="su-username"
               type="text"
               formControlName="username"
               placeholder="e.g. rahul_2024"
               autocomplete="username">
        <small class="field-err"
               *ngIf="signupForm.get('username')?.touched && signupForm.get('username')?.errors?.['required']">
          Username is required
        </small>
        <small class="field-err"
               *ngIf="signupForm.get('username')?.touched && signupForm.get('username')?.errors?.['pattern']">
          Only letters, numbers, dots and underscores
        </small>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label for="su-email">Email</label>
        <input id="su-email"
               type="email"
               formControlName="email"
               placeholder="you@example.com"
               autocomplete="email">
        <small class="field-err"
               *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['required']">
          Email is required
        </small>
        <small class="field-err"
               *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.errors?.['email']">
          Enter a valid email address
        </small>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="su-password">Password</label>
        <input id="su-password"
               type="password"
               formControlName="password"
               placeholder="Min 6 characters"
               autocomplete="new-password">
        <small class="field-err"
               *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.errors?.['required']">
          Password is required
        </small>
        <small class="field-err"
               *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.errors?.['minlength']">
          Minimum 6 characters required
        </small>
      </div>

      <!-- Phone (optional) -->
      <div class="field-group">
        <label for="su-contact">Phone <span class="optional">(optional)</span></label>
        <input id="su-contact"
               type="tel"
               formControlName="contact"
               placeholder="10-digit number"
               autocomplete="tel"
               maxlength="10">
      </div>

      <!-- Address (optional, only for Customer / Owner) -->
      <div class="field-group" *ngIf="role !== 'delivery'">
        <label>Address <span class="optional">(optional)</span></label>
        <input type="text"
               formControlName="street"
               placeholder="Street / Area"
               style="margin-bottom: 8px">
        <input type="text"
               formControlName="city"
               placeholder="City">
      </div>

      <!-- Submit -->
      <button type="submit"
              class="submit-btn"
              id="btn-signup-submit"
              [disabled]="isLoading">
        <span *ngIf="!isLoading">
          {{ role === 'owner' ? '🍴 Create Owner Account' : '👤 Create Customer Account' }}
        </span>
        <span *ngIf="isLoading">Creating account...</span>
      </button>

    </form>

    <!-- Alt link -->
    <p class="alt-link">
      Already have an account?
      <a routerLink="/select-role" id="link-to-login">Login here</a>
    </p>

  </div>
</div>
