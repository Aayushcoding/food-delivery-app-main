<div class="login-wrapper">
  <div class="login-card">

    <!-- Back button -->
    <button class="back-btn" (click)="goBack()" id="btn-back-to-landing">← Back</button>

    <!-- Header -->
    <div class="login-header">
      <span class="role-emoji">👤</span>
      <h1>ByteBites</h1>
      <p class="role-label">Login as <strong>Customer</strong></p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label for="cust-email">Email</label>
        <input
          id="cust-email"
          type="email"
          formControlName="email"
          placeholder="your@email.com"
          autocomplete="email"
        />
        <small class="err" *ngIf="f['email'].touched && f['email'].errors?.['required']">Email is required</small>
        <small class="err" *ngIf="f['email'].touched && f['email'].errors?.['email']">Invalid email address</small>
      </div>

      <div class="field-group">
        <label for="cust-pass">Password</label>
        <div class="pass-wrap">
          <input
            id="cust-pass"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••"
            autocomplete="current-password"
          />
          <button type="button" class="eye-btn" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁' }}
          </button>
        </div>
        <small class="err" *ngIf="f['password'].touched && f['password'].errors?.['required']">Password is required</small>
        <small class="err" *ngIf="f['password'].touched && f['password'].errors?.['minlength']">Min 6 characters</small>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="error-banner">⚠ {{ errorMessage }}</div>

      <button type="submit" class="submit-btn" [disabled]="isLoading" id="btn-customer-submit">
        <span *ngIf="!isLoading">Login →</span>
        <span *ngIf="isLoading" class="loading-dots">Logging in<span>.</span><span>.</span><span>.</span></span>
      </button>

    </form>

    <div class="alt-links">
      <span>Don't have an account?</span>
      <a routerLink="/signup">Sign up here</a>
    </div>

  </div>
</div>
