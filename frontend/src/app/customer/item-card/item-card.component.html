<div class="item-card">

  <!-- IMAGE or TEXT FALLBACK -->
  <div class="item-image">
    <ng-container *ngIf="item.image || item.imageUrl; else itemFallback">
      <img
        [src]="item.image || item.imageUrl"
        [alt]="item.itemName"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      >
      <div class="item-img-text-fallback" style="display:none">{{ item.itemName }}</div>
    </ng-container>
    <ng-template #itemFallback>
      <div class="item-img-text-fallback">{{ item.itemName }}</div>
    </ng-template>
    <span class="veg-badge" *ngIf="item.isVeg">🟢 Veg</span>
    <span class="nonveg-badge" *ngIf="!item.isVeg">🔴 Non-Veg</span>
  </div>

  <!-- INFO -->
  <div class="item-info">
    <h3 class="item-name">{{ item.itemName }}</h3>
    <p class="item-category">{{ item.category }}</p>
    <p class="item-description" *ngIf="item.description">{{ item.description }}</p>

    <div class="item-footer">
      <span class="price">₹{{ item.price }}</span>

      <!-- Not in cart → show Add button -->
      <button
        *ngIf="quantity === 0"
        class="btn-add"
        (click)="increase.emit(item)"
        [disabled]="inFlight">
        {{ inFlight ? '...' : '+ Add' }}
      </button>

      <!-- In cart → show quantity controls -->
      <div *ngIf="quantity > 0" class="qty-controls">
        <button class="qty-btn minus" (click)="decrease.emit(item)" [disabled]="inFlight">−</button>
        <span class="qty-value">{{ quantity }}</span>
        <button class="qty-btn plus" (click)="increase.emit(item)" [disabled]="inFlight">+</button>
      </div>
    </div>
  </div>

</div>
