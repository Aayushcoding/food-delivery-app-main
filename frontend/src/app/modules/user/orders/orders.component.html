<div class="orders-container">
  <h1>My Orders</h1>

  <div *ngIf="loading" class="loading">Loading orders...</div>

  <div *ngIf="!loading && orders.length === 0" class="no-orders">
    <p>You have no orders yet.</p>
    <a routerLink="/user/home" class="btn-shop">Start ordering</a>
  </div>

  <div class="orders-list" *ngIf="!loading && orders.length > 0">
    <div *ngFor="let order of orders" class="order-card">
      <div class="order-header">
        <h3>Order #{{ order.orderId.substring(0, 8) }}...</h3>
        <span [ngClass]="getStatusClass(order.status)">
          {{ order.status }}
        </span>
      </div>
      <div class="order-details">
        <p><strong>Restaurant ID:</strong> {{ order.restaurantId }}</p>
        <p><strong>Order Date:</strong> {{ order.date }}</p>
        <p><strong>Total Amount:</strong> ₹{{ order.totalAmount }}</p>
        <p><strong>Items:</strong> {{ order.items.length }}</p>
      </div>
    </div>
  </div>
</div>
