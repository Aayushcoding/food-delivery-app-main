<div class="add-menu-container">
  <h1>Add Menu Item</h1>

  <form [formGroup]="menuForm" (ngSubmit)="onSubmit()" class="menu-form">
    <div class="form-group">
      <label for="itemName">Item Name:</label>
      <input
        type="text"
        id="itemName"
        formControlName="itemName"
        class="form-control"
        [class.is-invalid]="submitted && f['itemName'].errors"
      />
      <div *ngIf="submitted && f['itemName'].errors" class="error-message">
        <div *ngIf="f['itemName'].errors['required']">Item name is required</div>
      </div>
    </div>

    <div class="form-group">
      <label for="price">Price:</label>
      <input
        type="number"
        id="price"
        formControlName="price"
        class="form-control"
        [class.is-invalid]="submitted && f['price'].errors"
        min="0"
      />
      <div *ngIf="submitted && f['price'].errors" class="error-message">
        <div *ngIf="f['price'].errors['required']">Price is required</div>
      </div>
    </div>

    <div class="form-group">
      <label for="category">Category:</label>
      <select
        id="category"
        formControlName="category"
        class="form-control"
        [class.is-invalid]="submitted && f['category'].errors"
      >
        <option value="">Select category</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
      <div *ngIf="submitted && f['category'].errors" class="error-message">
        <div *ngIf="f['category'].errors['required']">Category is required</div>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description:</label>
      <textarea
        id="description"
        formControlName="description"
        class="form-control"
        [class.is-invalid]="submitted && f['description'].errors"
        rows="4"
      ></textarea>
      <div *ngIf="submitted && f['description'].errors" class="error-message">
        <div *ngIf="f['description'].errors['required']">Description is required</div>
      </div>
    </div>

    <div class="form-group checkbox">
      <input
        type="checkbox"
        id="isVeg"
        formControlName="isVeg"
      />
      <label for="isVeg">Vegetarian</label>
    </div>

    <button type="submit" class="btn-submit">Add Item</button>
  </form>
</div>
