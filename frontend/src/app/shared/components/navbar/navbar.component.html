<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
  <div class="container-fluid">
    <!-- Logo and Brand -->
    <a class="navbar-brand d-flex align-items-center" [routerLink]="getHomeLink()">
      <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=40&h=40&fit=crop&crop=center" alt="Logo" class="rounded-circle me-2" style="width: 40px; height: 40px;">
      <span class="fw-bold text-primary fs-4">FoodHub</span>
    </a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation Links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <!-- Customer Navigation -->
        <ng-container *ngIf="isLoggedIn && currentUser?.role === 'Customer'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/user/home" routerLinkActive="active">
              <i class="fas fa-home me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/user/restaurants" routerLinkActive="active">
              <i class="fas fa-utensils me-1"></i>Restaurants
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link position-relative" routerLink="/user/cart" routerLinkActive="active">
              <i class="fas fa-shopping-cart me-1"></i>Cart
              <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle" *ngIf="cartCount > 0">{{cartCount}}</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/user/orders" routerLinkActive="active">
              <i class="fas fa-list me-1"></i>Orders
            </a>
          </li>
        </ng-container>

        <!-- Owner Navigation -->
        <ng-container *ngIf="isLoggedIn && currentUser?.role === 'Owner'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/owner/dashboard" routerLinkActive="active">
              <i class="fas fa-tachometer-alt me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/owner/manage-menu" routerLinkActive="active">
              <i class="fas fa-utensils me-1"></i>Manage Menu
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/owner/manage-orders" routerLinkActive="active">
              <i class="fas fa-clipboard-list me-1"></i>Manage Orders
            </a>
          </li>
        </ng-container>

        <!-- Delivery Agent Navigation -->
        <ng-container *ngIf="isLoggedIn && currentUser?.role === 'DeliveryAgent'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/delivery/dashboard" routerLinkActive="active">
              <i class="fas fa-truck me-1"></i>Delivery Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/delivery/deliveries" routerLinkActive="active">
              <i class="fas fa-route me-1"></i>My Deliveries
            </a>
          </li>
        </ng-container>
      </ul>

      <!-- Auth Section -->
      <div class="d-flex align-items-center" *ngIf="!isLoggedIn">
        <a routerLink="/auth/login" class="btn btn-outline-primary me-2">Login</a>
        <a routerLink="/auth/register" class="btn btn-primary">Sign Up</a>
      </div>

      <!-- User Profile Section -->
      <div class="dropdown" *ngIf="isLoggedIn && currentUser">
        <button class="btn btn-link dropdown-toggle d-flex align-items-center text-decoration-none" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop&crop=face" alt="Profile" class="rounded-circle me-2" style="width: 32px; height: 32px;">
          <span class="d-none d-md-inline">{{currentUser.username}}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
          <li><a class="dropdown-item" routerLink="/user/profile"><i class="fas fa-user me-2"></i>Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><button class="dropdown-item text-danger" (click)="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</button></li>
        </ul>
      </div>
    </div>
  </div>
</nav>
